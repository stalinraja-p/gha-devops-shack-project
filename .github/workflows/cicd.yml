name: CICD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build with Maven
        run: mvn compile

  security-checks:
    runs-on: self-hosted
    needs: build 
    
    steps:
      - uses: actions/checkout@v4

      - name: Cache Trivy & Gitleaks binaries
        uses: actions/cache@v4
        with:
          path: ~/.local/bin
          key: security-tools-trivy-gitleaks-v1

      - name: Install Trivy (if not cached)
        run: |
          if ! command -v trivy &> /dev/null; then
            wget -q https://github.com/aquasecurity/trivy/releases/download/v0.51.1/trivy_0.51.1_Linux-64bit.tar.gz
            tar -xzf trivy_0.51.1_Linux-64bit.tar.gz
            mkdir -p ~/.local/bin
            mv trivy ~/.local/bin/
          fi
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          trivy --version

      - name: Install Gitleaks (if not cached)
        run: |
          if ! command -v gitleaks &> /dev/null; then
            wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz
            tar -xzf gitleaks_8.18.4_linux_x64.tar.gz
            mkdir -p ~/.local/bin
            mv gitleaks ~/.local/bin/
          fi
          gitleaks version

      - name: Trivy FS Scan
        run: trivy fs --format table -o fs-report.json .

      - name: Gitleaks Code Scan
        run: gitleaks detect --source . -r gitleaks-report.json -f json
    
  test: 
    runs-on: self-hosted
    needs: security-checks
    
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Run Tests with Maven
        run: mvn test
      
      
